project:
  type: website
  output-dir: docs          # GitHub Pages serves from the /docs folder

website:
  title: "Rossouw van Jaarsveld | Overfit and Chill"
  description: "Stuff about analytics"
  site-url: "https://rossouwvanjaarsveld-lang.github.io/website"
  favicon: favicon.ico      # optional: add a favicon.ico file to the root later

  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
    right:
      - icon: github
        href: https://github.com/yourusername   
      - icon: linkedin
        href: https://linkedin.com/in/yourprofile  # optional

  page-footer:
    left: "© 2025 Rossouw van Jaarsveld"
    right:
      - text: "Built with Quarto"
        href: https://quarto.org

format:
  html:
    theme: slate           
    css: styles.css
    toc: true               # table of contents on each post
    toc-depth: 3
    code-fold: true         
    code-tools: true        # adds a copy button to code blocks

execute:
  freeze: auto              # only re-run code if the source file changes
