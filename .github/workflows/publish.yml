name: Render and Publish Quarto Site

on:
  push:
    branches: [main]        # runs every time you push to main

permissions:
  contents: write           # needed to push the rendered /docs folder back

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Install R
      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.3"

      # 3. Install Python
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4. Install Python packages your posts need
      - name: Install Python dependencies
        run: pip install pandas numpy plotly

      # 5. Install R packages your posts need
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::plotly
            any::lubridate
            any::scales

      # 6. Install Quarto
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 7. Render the site (output goes into /docs as configured in _quarto.yml)
      - name: Render Quarto site
        run: quarto render

      # 8. Push the rendered /docs folder back to the repo
      #    GitHub Pages will automatically serve it
      - name: Commit and push rendered site
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add docs/
          git diff --staged --quiet || git commit -m "Render site [skip ci]"
          git push
